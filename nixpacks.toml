[phases.setup]
nixPkgs = ["nodejs_23"]

[phases.install]
cmds = [
  "npm install -g corepack@latest && corepack enable",
  "pnpm i --frozen-lockfile"
]

[phases.build]
cmds = [
  "find node_modules/.pnpm -name 'esbuild' -path '*/bin/esbuild' -exec chmod +x {} \\; && npm --prefix apps/web run build"
]

[start]
cmd = "node apps/web/dist/server/entry.mjs"
